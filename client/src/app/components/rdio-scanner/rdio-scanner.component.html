<mat-sidenav-container [hasBackdrop]="false">
    <mat-sidenav #searchPanel [autoFocus]="false" [disableClose]="true" position="start">
        <div class="panel search">
            <mat-toolbar>
                <div>
                    <button mat-icon-button (click)="searchPanel.close()">
                        <mat-icon>arrow_forward</mat-icon>
                    </button>
                </div>
            </mat-toolbar>
            <div #scrollableSearch>
                <div>
                    <rdio-scanner-search #searchComponent (focusedCall)="onSearchFocusedCall(scrollableSearch)"></rdio-scanner-search>
                </div>
            </div>
        </div>
    </mat-sidenav>
    <mat-sidenav #statsPanel [autoFocus]="false" [disableClose]="true" position="start" class="stats-sidenav">
        <div class="panel stats">
            <mat-toolbar>
                <div>
                    <button mat-icon-button (click)="statsPanel.close()">
                        <mat-icon>arrow_forward</mat-icon>
                    </button>
                </div>
                <span class="toolbar-title">Statistics</span>
            </mat-toolbar>
            <div #scrollableStats>
                <div>
                    <rdio-scanner-public-stats #statsComponent></rdio-scanner-public-stats>
                </div>
            </div>
        </div>
    </mat-sidenav>
    <mat-sidenav #selectPanel [autoFocus]="false" [disableClose]="true" position="end">
        <div class="panel select">
            <mat-toolbar>
                <div>
                    <button mat-icon-button (click)="selectPanel.close()">
                        <mat-icon>arrow_back</mat-icon>
                    </button>
                </div>
            </mat-toolbar>
            <div #scrollableSelect>
                <div>
                    <rdio-scanner-select></rdio-scanner-select>
                </div>
            </div>
        </div>
    </mat-sidenav>
    <mat-sidenav-content>
        <rdio-scanner-main
            (openSearchPanel)="scrollTop(scrollableSearch); searchPanel.open(); searchComponent.searchCalls()"
            (openSelectPanel)="scrollTop(scrollableSelect); selectPanel.open();"
            (openStatsPanel)="scrollTop(scrollableStats); statsPanel.open(); statsComponent.refresh()"
            (toggleFullscreen)="toggleFullscreen()">
        </rdio-scanner-main>
    </mat-sidenav-content>
</mat-sidenav-container>
